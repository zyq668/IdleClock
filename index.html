<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>闲置时钟</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body data-theme="obsidian" data-style="digital">
    <main class="clock-shell" aria-live="polite">
      <section class="clock-face" aria-label="当前时间">
        <div class="time" id="time">--:--</div>
        <div class="date" id="date">--</div>
      </section>
    </main>

    <nav class="control-bar" id="controls" aria-label="时钟控制">
      <button class="icon-button" type="button" data-action="fullscreen" title="全屏 (F)" aria-label="全屏">
        <span aria-hidden="true">全屏</span>
      </button>
      <button class="icon-button" type="button" data-action="theme-prev" title="上一个主题" aria-label="上一个主题">
        <span aria-hidden="true">&lt;</span>
      </button>
      <button class="text-button theme-chip" type="button" data-action="theme-next" title="下一个主题 (T)" aria-label="下一个主题">
        <span id="themeName">曜石</span>
      </button>
      <button class="text-button style-chip" type="button" data-action="display-next" title="切换显示风格 (V)" aria-label="切换显示风格">
        <span id="styleName">数字</span>
      </button>
      <button class="text-button" type="button" data-action="toggle-hour" title="切换 12/24 小时" aria-label="切换 12/24 小时">
        <span id="hourMode">24H</span>
      </button>
      <button class="text-button" type="button" data-action="toggle-seconds" title="显示或隐藏秒 (S)" aria-label="显示或隐藏秒">
        <span id="secondsMode">秒关</span>
      </button>
      <button class="icon-button" type="button" data-action="scale-down" title="缩小字号" aria-label="缩小字号">
        <span aria-hidden="true">A-</span>
      </button>
      <button class="icon-button" type="button" data-action="scale-up" title="放大字号" aria-label="放大字号">
        <span aria-hidden="true">A+</span>
      </button>
      <label class="slider-control" title="亮度">
        <span aria-hidden="true">亮</span>
        <input id="brightness" type="range" min="0.45" max="1.15" step="0.05" value="1" aria-label="亮度">
      </label>
      <label class="slider-control position-control" title="左右位置">
        <span aria-hidden="true">横</span>
        <input id="positionX" type="range" min="-35" max="35" step="1" value="0" aria-label="左右位置">
      </label>
      <label class="slider-control position-control" title="上下位置">
        <span aria-hidden="true">纵</span>
        <input id="positionY" type="range" min="-35" max="35" step="1" value="0" aria-label="上下位置">
      </label>
      <button class="text-button" type="button" data-action="reset-position" title="恢复居中 (C)" aria-label="恢复居中">
        <span>居中</span>
      </button>
      <button class="text-button" type="button" data-action="toggle-drift" title="漂移档位" aria-label="漂移档位">
        <span id="driftMode">轻微</span>
      </button>
      <button class="icon-button" type="button" data-action="hide-controls" title="隐藏控制栏 (H)" aria-label="隐藏控制栏">
        <span aria-hidden="true">隐藏</span>
      </button>
    </nav>
  </body>
</html>
